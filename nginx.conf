server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s;
    set $backend http://backend:8080;

    location /ask {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location /auth {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /reset {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /suggestions {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /download {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass $backend;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
